# Thin caller — delegates all build/register/deploy logic to the
# reusable workflow at .github/workflows/deploy-dmapp-reusable.yml.
#
# To adapt this for another UI app repo, copy this file and update:
#   catalog_id           → your package's Catalog GUID
#   agent_destination_id → your target DMA agent GUID
#
# Required secrets on this repo:
#   DATAMINER_TOKEN, VITE_CLIENT_ID, VITE_TENANT_ID, VITE_DATAVERSE_URL
# Required vars:
#   VITE_REDIRECT_URI

name: Build, Register and Deploy DMAPP to DMA on PR Merge

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: >
          Target environment for a manual deploy. 'dev' installs to the
          /public/DynamicsActivitiesDev/ folder and leaves production
          untouched. 'prod' installs to /public/DynamicsActivities/.
          PR merges to main always deploy to production.
        type: choice
        options:
          - dev
          - prod
        default: dev

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    uses: ./.github/workflows/deploy-dmapp-reusable.yml
    with:
      catalog_id:           "b6dc92d4-401e-42fd-b7bd-87d1ff562420"
      agent_destination_id: "e21dbc3e-7592-48f8-867b-d81d4ff06bee"
      # Manual 'dev' deploys target the DynamicsActivitiesDev folder; PR merges
      # and manual 'prod' deploys target the production DynamicsActivities folder.
      app_base_path:           ${{ (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev') && '/public/DynamicsActivitiesDev/' || '/public/DynamicsActivities/' }}
      dotnet_build_properties: ${{ (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev') && '-p:WebAppPublicFolder=DynamicsActivitiesDev' || '' }}
      version_suffix:          ${{ (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev') && '-dev' || '' }}
    secrets: inherit
