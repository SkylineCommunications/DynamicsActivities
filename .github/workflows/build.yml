name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy build output to dataminer-dist
        run: |
          rm -rf dataminer-dist
          cp -r dist-dataminer dataminer-dist

      - name: Zip dataminer-dist
        run: zip -r dataminer-dist.zip dataminer-dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dataminer-dist
          path: dataminer-dist.zip
