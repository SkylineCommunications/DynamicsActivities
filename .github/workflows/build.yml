name: Build

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_CLIENT_ID: ${{ secrets.VITE_CLIENT_ID }}
          VITE_TENANT_ID: ${{ secrets.VITE_TENANT_ID }}
          VITE_DATAVERSE_URL: ${{ secrets.VITE_DATAVERSE_URL }}
          VITE_REDIRECT_URI: ${{ vars.VITE_REDIRECT_URI }}

      - name: Copy build output to dataminer-dist
        run: |
          rm -rf dataminer-dist
          cp -r dist-dataminer dataminer-dist

      - name: Zip dataminer-dist
        run: zip -r dataminer-dist.zip dataminer-dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dataminer-dist
          path: dataminer-dist.zip
